<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-dom.io Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
            animation: fadeIn 2s;
        }
        
        h1 {
            font-size: 2.5em;
            animation: slideIn 1s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        iframe {
            border: none;
            width: 100%;
            height: 500px;
            background: white;
            animation: appear 1s;
        }

        @keyframes appear {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>Welcome to E-dom.io Project</h1>
    <p>Please fill out the form below:</p>
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfD4XgQXH8q3VXsN9hv5z9d9eE_wslF0g8mC5ZT-tnQAfCF3g/viewform?embedded=true">Loading…</iframe>
</body>
</html>
